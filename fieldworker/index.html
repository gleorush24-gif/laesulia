<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laesulia Field Worker</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --navy:#0a1628; --blue:#0066cc; --green:#16a34a; --red:#dc2626;
      --orange:#ea580c; --yellow:#d97706;
      --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
      --gray-400:#94a3b8; --gray-600:#475569; --gray-800:#1e293b;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Outfit',sans-serif; background:var(--gray-50); min-height:100vh; color:var(--gray-800); }

    /* ── Auth ── */
    .auth-screen { display:none; min-height:100vh; background:var(--navy); align-items:center; justify-content:center; padding:24px; flex-direction:column; }
    .auth-screen.active { display:flex; }
    .auth-logo { text-align:center; margin-bottom:28px; }
    .auth-logo h1 { font-family:'Fraunces',serif; font-size:32px; color:white; font-weight:700; }
    .auth-logo p { color:rgba(255,255,255,0.5); font-size:14px; margin-top:4px; }
    .auth-logo span { color:#60a5fa; font-weight:600; }
    .auth-card { background:white; border-radius:20px; padding:32px; width:100%; max-width:400px; }
    .auth-card h2 { font-size:20px; font-weight:700; margin-bottom:18px; }
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:11px; font-weight:700; color:var(--gray-600); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
    .field input { width:100%; padding:12px 14px; border:1.5px solid var(--gray-200); border-radius:10px; font-size:15px; font-family:'Outfit',sans-serif; outline:none; }
    .field input:focus { border-color:var(--blue); }
    .btn-full { width:100%; padding:14px; background:var(--blue); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'Outfit',sans-serif; cursor:pointer; margin-top:8px; }
    .btn-full.green { background:var(--green); }
    .auth-switch { text-align:center; margin-top:14px; font-size:14px; color:var(--gray-600); }
    .auth-switch a { color:var(--blue); font-weight:600; cursor:pointer; }
    .auth-error { color:var(--red); font-size:13px; margin-top:8px; display:none; }

    /* ── App ── */
    #app { display:none; min-height:100vh; flex-direction:column; }

    /* ── Navbar ── */
    .navbar {
      background:var(--navy); color:white;
      padding:0 20px; height:54px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:200;
      box-shadow:0 2px 12px rgba(0,0,0,0.2);
    }
    .navbar-brand { display:flex; align-items:center; gap:8px; }
    .navbar-brand h1 { font-family:'Fraunces',serif; font-size:18px; font-weight:700; }
    .navbar-links { display:flex; align-items:center; gap:2px; }
    .nav-link { padding:7px 11px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; color:rgba(255,255,255,0.6); border:none; background:none; font-family:'Outfit',sans-serif; white-space:nowrap; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
    .nav-link:hover { background:rgba(255,255,255,0.08); color:white; }
    .nav-link.active { background:rgba(0,102,204,0.3); color:white; }
    .navbar-right { display:flex; align-items:center; gap:8px; }
    .wallet-chip { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:5px 11px; font-size:13px; font-weight:600; color:white; cursor:pointer; white-space:nowrap; }
    .hamburger { display:none; background:none; border:none; cursor:pointer; color:white; font-size:22px; padding:4px; }
    .mobile-menu { display:none; background:var(--navy); border-top:1px solid rgba(255,255,255,0.1); padding:8px 16px 16px; }
    .mobile-menu.open { display:block; }
    .mobile-nav-link { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:10px; cursor:pointer; font-size:15px; font-weight:500; color:rgba(255,255,255,0.7); margin-bottom:4px; border:none; background:none; font-family:'Outfit',sans-serif; width:100%; text-align:left; }
    .mobile-nav-link:hover, .mobile-nav-link.active { background:rgba(0,102,204,0.25); color:white; }
    .mobile-footer { padding:12px 14px; border-top:1px solid rgba(255,255,255,0.1); margin-top:8px; display:flex; justify-content:space-between; align-items:center; }
    .btn-signout { padding:6px 12px; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.12); border-radius:8px; font-size:12px; font-family:'Outfit',sans-serif; cursor:pointer; }

    /* ── Content ── */
    .content { flex:1; }

    /* ── Map ── */
    #map { height:calc(100vh - 54px); width:100%; }

    /* ── Bounty cards ── */
    .section { padding:16px; max-width:600px; margin:0 auto; }
    .section-title { font-size:12px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
    .bounty-card { background:white; border-radius:14px; padding:16px; margin-bottom:12px; border:1px solid var(--gray-200); box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .bounty-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; gap:10px; }
    .bounty-title { font-size:16px; font-weight:700; }
    .bounty-desc { font-size:13px; color:var(--gray-600); margin-top:2px; }
    .reward-chip { background:var(--red); color:white; font-size:13px; font-weight:700; padding:5px 10px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
    .reward-chip.orange { background:var(--orange); }
    .reward-chip.green { background:var(--green); }
    .status-badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; }
    .status-open { background:#dbeafe; color:var(--blue); }
    .status-claimed { background:#fef3c7; color:var(--yellow); }
    .bounty-btn { width:100%; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:700; font-family:'Outfit',sans-serif; cursor:pointer; margin-top:10px; }
    .bounty-btn.claim { background:var(--blue); color:white; }
    .bounty-btn.upload { background:var(--orange); color:white; }
    .bounty-btn.submit { background:var(--green); color:white; }

    /* ── Upload ── */
    .upload-header { background:white; border-bottom:1px solid var(--gray-200); padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:54px; z-index:100; }
    .back-btn { background:var(--gray-100); border:none; border-radius:8px; padding:7px 12px; font-size:16px; cursor:pointer; }
    .upload-body { padding:16px; max-width:600px; margin:0 auto; }
    .bounty-info-card { background:#fef2f2; border:1px solid #fecaca; border-radius:12px; padding:14px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
    .progress-bar { background:var(--gray-200); border-radius:8px; height:8px; overflow:hidden; margin-bottom:6px; }
    .progress-fill { background:var(--green); height:100%; border-radius:8px; transition:width 0.3s; }
    .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
    .photo-thumb { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; border:2px solid var(--green); }
    .add-photo-btn { width:100%; padding:16px; border:2px dashed var(--gray-200); background:white; border-radius:12px; font-size:15px; font-weight:600; color:var(--gray-600); font-family:'Outfit',sans-serif; cursor:pointer; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .msg-box { padding:12px 14px; border-radius:10px; font-size:13px; margin-bottom:12px; }
    .msg-success { background:#dcfce7; color:#166534; border:1px solid #86efac; }
    .msg-error { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .instructions { background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; padding:14px; margin-bottom:14px; }
    .instructions li { font-size:13px; color:#1e40af; margin-bottom:4px; padding-left:4px; }

    /* ── Wallet ── */
    .wallet-hero { background:var(--navy); color:white; padding:32px 20px; text-align:center; }
    .wallet-balance { font-family:'Fraunces',serif; font-size:48px; font-weight:700; }
    .wallet-label { font-size:14px; color:rgba(255,255,255,0.5); margin-top:4px; }
    .wallet-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; max-width:500px; margin:0 auto; }
    .wallet-stat { background:white; border-radius:12px; padding:16px; border:1px solid var(--gray-200); text-align:center; }
    .wallet-stat-val { font-family:'Fraunces',serif; font-size:24px; font-weight:700; color:var(--green); }
    .wallet-stat-label { font-size:12px; color:var(--gray-400); margin-top:4px; }

    /* ── Profile ── */
    .profile-header { background:var(--navy); color:white; padding:32px 20px; text-align:center; }
    .profile-avatar { width:72px; height:72px; background:var(--blue); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; margin:0 auto 12px; }
    .profile-name { font-family:'Fraunces',serif; font-size:22px; font-weight:700; }
    .profile-email { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
    .profile-menu { padding:16px; max-width:500px; margin:0 auto; }
    .menu-item { background:white; border-radius:12px; padding:16px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; border:1px solid var(--gray-200); }
    .menu-item-left { display:flex; align-items:center; gap:12px; font-size:15px; font-weight:500; }
    .menu-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }

    /* ── Toast ── */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--gray-800); color:white; padding:12px 20px; border-radius:10px; font-size:14px; opacity:0; transition:all 0.25s; z-index:500; white-space:nowrap; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .navbar-links { display:none; }
      .hamburger { display:block; }
    }
    @media (min-width: 641px) {
      .wallet-chip { display:flex; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="auth-screen active" id="login-screen">
  <div class="auth-logo"><h1>🗺️ Laesulia</h1><p>"<span>to follow</span>" — Toobaita, Malaita</p></div>
  <div class="auth-card">
    <h2>Sign In</h2>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" onkeyup="if(event.key==='Enter')login()"></div>
    <div class="auth-error" id="login-error"></div>
    <button class="btn-full" onclick="login()" id="login-btn">Sign In</button>
    <div class="auth-switch">New to Laesulia? <a onclick="showRegister()">Create account</a></div>
  </div>
</div>

<!-- Register -->
<div class="auth-screen" id="register-screen">
  <div class="auth-logo"><h1>🗺️ Laesulia</h1><p>Join as a Field Worker</p></div>
  <div class="auth-card">
    <h2>Create Account</h2>
    <div class="field"><label>Full Name</label><input type="text" id="reg-name" placeholder="e.g. John Kwai"></div>
    <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com"></div>
    <div class="field"><label>Mobile Money Number</label><input type="tel" id="reg-phone" placeholder="e.g. 7XXXXXXX"></div>
    <div class="field"><label>Password</label><input type="password" id="reg-password" placeholder="Min 6 characters"></div>
    <div class="auth-error" id="reg-error"></div>
    <button class="btn-full green" onclick="register()" id="reg-btn">Create Account</button>
    <div class="auth-switch">Already have an account? <a onclick="showLogin()">Sign in</a></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <nav class="navbar">
    <div class="navbar-brand"><span style="font-size:20px">🗺️</span><h1>Laesulia</h1></div>
    <div class="navbar-links">
      <button class="nav-link active" id="nav-map" onclick="navigate('map')">🗺️ Map</button>
      <button class="nav-link" id="nav-bounties" onclick="navigate('bounties')">🎯 Bounties</button>
      <button class="nav-link" id="nav-treasure" onclick="navigate('treasure')">🏴 Treasure</button>
      <button class="nav-link" id="nav-wallet" onclick="navigate('wallet')">💰 Wallet</button>
      <button class="nav-link" id="nav-navigate" onclick="navigate('navigate')">🧭 Navigate</button>
      <button class="nav-link" id="nav-profile" onclick="navigate('profile')">👤 Profile</button>
    </div>
    <div class="navbar-right">
      <div class="wallet-chip" id="wallet-chip" onclick="navigate('wallet')">💰 $0 SBD</div>
      <button class="hamburger" onclick="toggleMenu()">☰</button>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobile-menu">
    <button class="mobile-nav-link" id="mnav-map" onclick="navigate('map');toggleMenu()">🗺️ Map</button>
    <button class="mobile-nav-link" id="mnav-bounties" onclick="navigate('bounties');toggleMenu()">🎯 Bounties</button>
    <button class="mobile-nav-link" id="mnav-treasure" onclick="navigate('treasure');toggleMenu()">🏴 Treasure</button>
    <button class="mobile-nav-link" id="mnav-wallet" onclick="navigate('wallet');toggleMenu()">💰 Wallet</button>
    <button class="mobile-nav-link" id="mnav-navigate" onclick="navigate('navigate');toggleMenu()">🧭 Navigate</button>
    <button class="mobile-nav-link" id="mnav-profile" onclick="navigate('profile');toggleMenu()">👤 Profile</button>
    <div class="mobile-footer">
      <span id="mobile-username" style="color:rgba(255,255,255,0.5);font-size:13px"></span>
      <button class="btn-signout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

<input type="file" id="file-input" accept="image/*" capture="environment">
<div class="toast" id="toast"></div>

<script>
const API = 'https://laesulia-api.onrender.com/api/v1';
let token = localStorage.getItem('fw_token');
let username = localStorage.getItem('fw_username');
let currentView = 'map';
let mapInstance = null;
let currentUploadBounty = null;
let uploadedFiles = [];
const required = 1;

window.onload = () => {
  if (token) showApp();
  document.getElementById('file-input').addEventListener('change', handleFileSelect);
};

function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }
function showRegister() { document.getElementById('login-screen').classList.remove('active'); document.getElementById('register-screen').classList.add('active'); }
function showLogin() { document.getElementById('register-screen').classList.remove('active'); document.getElementById('login-screen').classList.add('active'); }

async function login() {
  const emailVal = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span>Signing in…'; btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:emailVal, password}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveAuth(data, emailVal); showApp();
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
  finally { btn.innerHTML = 'Sign In'; btn.disabled = false; }
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const emailVal = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  const btn = document.getElementById('reg-btn');
  errEl.style.display = 'none';
  if (!name || !emailVal || !password) { errEl.textContent = 'All fields required'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return; }
  btn.innerHTML = '<span class="spinner"></span>Creating…'; btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:name, email:emailVal, password, phone:document.getElementById("reg-phone").value.trim()}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');
    saveAuth(data, emailVal); showApp();
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
  finally { btn.innerHTML = 'Create Account'; btn.disabled = false; }
}

function saveAuth(data, emailVal) {
  token = data.token; username = data.username;
  localStorage.setItem('fw_token', token);
  localStorage.setItem('fw_username', data.username);
  localStorage.setItem('fw_email', emailVal || '');
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('register-screen').classList.remove('active');
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('mobile-username').textContent = username || '';
  navigate('map');
  loadWallet();
}

function logout() { localStorage.clear(); token = null; document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').classList.add('active'); }

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, { ...options, headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(options.headers||{})} });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

function navigate(view) {
  currentView = view;
  ['map','bounties','wallet','profile','navigate','treasure'].forEach(v => {
    const el = document.getElementById('nav-'+v);
    const mel = document.getElementById('mnav-'+v);
    if (el) el.classList.toggle('active', v === view);
    if (mel) mel.classList.toggle('active', v === view);
  });
  if (view === 'map') renderMap();
  else if (view === 'bounties') renderBounties();
  else if (view === 'wallet') renderWallet();
  else if (view === 'profile') renderProfile();
  else if (view === 'navigate') renderNavigate();
  else if (view === 'treasure') renderTreasure();
}

// ── Map ───────────────────────────────────────────────────────────────────────
async function renderMap() {
  document.getElementById('content').innerHTML = '<div id="map"></div>';
  await new Promise(r => setTimeout(r, 50));
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  mapInstance = L.map('map').setView([-9.4313, 160.0521], 13);
  var satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {attribution:'© Google', maxZoom:21, maxNativeZoom:21});
  var streets = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {attribution:'© Google', maxZoom:21, maxNativeZoom:21});
  satellite.addTo(mapInstance);
  L.control.layers({'🛰️ Satellite': satellite, '🗺️ Streets': streets}, {}, {position:'topright'}).addTo(mapInstance);
  const data = await apiFetch('/bounties?lat=-9.4313&lng=160.0521&radius=50000');
  if (!data?.bounties) return;
  data.bounties.forEach(b => {
    const color = b.status==='open' ? '#dc2626' : b.status==='claimed' ? '#ea580c' : '#16a34a';
    const emoji = b.status==='open' ? '🔴' : b.status==='claimed' ? '🟡' : '✅';
    L.circleMarker([b.lat, b.lng], {radius:10, fillColor:color, color:'white', weight:2, fillOpacity:0.9}).addTo(mapInstance)
      .bindPopup('<div style="min-width:150px;font-family:sans-serif"><b>' + b.title + '</b><br><small style="color:#6b7280">' + b.status + '</small><br><b style="color:#dc2626">$' + b.reward_sbd + ' SBD</b>' + (b.status==='open' ? '<br><button data-id="' + b.id + '" data-title="' + b.title.replace(/"/g,'') + '" data-reward="' + b.reward_sbd + '" data-desc="' + (b.description||'').replace(/"/g,'') + '" onclick="claimFromMap(this.dataset.id,this.dataset.title,this.dataset.reward,this.dataset.desc)" style="width:100%;margin-top:8px;padding:8px;background:#0066cc;color:white;border:none;border-radius:6px;font-weight:700;cursor:pointer">🎯 Claim</button>' : '') + '</div>');
  });
}

// ── Bounties ──────────────────────────────────────────────────────────────────
async function renderBounties() {
  document.getElementById('content').innerHTML = '<div class="section"><div class="section-title">Loading…</div></div>';
  const data = await apiFetch('/bounties?lat=-9.4313&lng=160.0521&radius=50000');
  if (!data?.bounties?.length) { document.getElementById('content').innerHTML = '<div class="section" style="text-align:center;padding:48px;color:#94a3b8">No bounties available</div>'; return; }
  const open = data.bounties.filter(b => b.status==='open');
  const mine = data.bounties.filter(b => b.status==='claimed');
  let html = '<div class="section">';
  if (open.length) {
    html += `<div class="section-title">🔴 Open — ${open.length} available</div>`;

  if (!open.length && !mine.length) html += '<div style="text-align:center;padding:48px;color:#94a3b8">No open bounties right now 🌴</div>';
  html += '</div>';
  document.getElementById('content').innerHTML = html;

async function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file || !currentUploadBounty) return;
  e.target.value = '';
  const msgEl = document.getElementById('upload-msg');
  if (msgEl) msgEl.innerHTML = '<div class="msg-box msg-success"><span class="spinner"></span> Uploading…</div>';
  try {
    const formData = new FormData();
    formData.append('file', file, file.name);
    const res = await fetch(API + '/bounties/' + currentUploadBounty.id + '/upload', { method:'POST', headers:{'Authorization':'Bearer '+token}, body:formData });
    const data = await res.json();
    if (res.ok) {
      const reader = new FileReader();
      reader.onload = (ev) => { uploadedFiles.push(ev.target.result); renderUploadScreen(); };
      reader.readAsDataURL(file);
    } else {
      if (msgEl) msgEl.innerHTML = `<div class="msg-box msg-error">❌ ${data.error||'Upload failed'}</div>`;
    }
  } catch(err) { if (msgEl) msgEl.innerHTML = '<div class="msg-box msg-error">❌ Network error</div>'; }
}

let navMap = null;
let navUserMarker = null;
let navDestMarker = null;
let navRouteLine = null;
let navTrailLine = null;
let navTrailPoints = [];
let navWatchId = null;
let navUserPos = null;

function renderNavigate() {
  document.getElementById('content').innerHTML = `

        📍 Getting your location…

          </div>
        </div>
        <button onclick="clearNavDestination()" style="margin-top:10px;width:100%;padding:8px;background:#f1f5f9;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;color:#475569">✕ Clear Destination</button>
      </div>

      <!-- Instruction banner -->
      <div id="nav-instruction" style="position:absolute;bottom:16px;left:16px;right:16px;z-index:1000;background:#0066cc;color:white;border-radius:16px;padding:14px 16px;font-size:14px;font-weight:600;text-align:center;display:none">
        Tap anywhere on the map to set destination
      </div>

      <!-- Tap hint -->
      <div id="nav-tap-hint" style="position:absolute;bottom:16px;left:16px;right:16px;z-index:1000;background:#0066cc;color:white;border-radius:16px;padding:14px 16px;font-size:14px;font-weight:600;text-align:center">
        Tap anywhere on the map to set destination 📍
      </div>
    </div>`;

  setTimeout(initNavMap, 300);

function initNavMap() {
  if (typeof L === 'undefined') { setTimeout(initNavMap, 200); return; }
  const el = document.getElementById('nav-map');
  if (!el) return;

  navMap = L.map('nav-map', {zoomControl: true}).setView([-9.4313, 160.0521], 14);
  
  // Google satellite + streets toggle
  var satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {attribution:'© Google', maxZoom:21, maxNativeZoom:21});
  var streets = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {attribution:'© Google', maxZoom:21, maxNativeZoom:21});
  satellite.addTo(navMap);
  L.control.layers({'🛰️ Satellite': satellite, '🗺️ Streets': streets}, {}, {position:'topright'}).addTo(navMap);

  // Start watching user position
  startNavTracking();

  // Tap to set destination
  navMap.on('click', function(e) {
    setNavDestination(e.latlng.lat, e.latlng.lng);
  });
}

function startNavTracking() {
  if (!navigator.geolocation) {
    document.getElementById('nav-status').textContent = '❌ GPS not available';
    return;
  }

  navWatchId = navigator.geolocation.watchPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const heading = pos.coords.heading;
      const accuracy = pos.coords.accuracy;
      
      navUserPos = {lat, lng};
      updateNavUserMarker(lat, lng, heading);
      
      // Add to trail
      navTrailPoints.push([lat, lng]);
      if (navTrailPoints.length > 1) {
        if (navTrailLine) navMap.removeLayer(navTrailLine);
        navTrailLine = L.polyline(navTrailPoints, {
          color: '#0066cc',
          weight: 3,
          opacity: 0.7,
          dashArray: '8,4'
        }).addTo(navMap);
      }

      // Update status
      const acc = Math.round(accuracy);
      document.getElementById('nav-status').innerHTML = `📍 Tracking — ±${acc}m accuracy`;
      
      // Update distance if destination set
      if (navDestMarker) {
        updateNavDistance(lat, lng);
        drawRoute(lat, lng);
      }

      // Center map on user
      if (navTrailPoints.length <= 2) {
        navMap.setView([lat, lng], 16);
      }
    },
    function(err) {
      document.getElementById('nav-status').textContent = '❌ GPS error: ' + err.message;
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    }
  );
}

function updateNavUserMarker(lat, lng, heading) {
  // Create rotating triangle SVG
  const rotation = heading || 0;
  const svgIcon = L.divIcon({
    className: '',
    html: `<div style="transform:rotate(${rotation}deg);transition:transform 0.3s">
      <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="14" fill="rgba(0,102,204,0.15)" stroke="#0066cc" stroke-width="2"/>
        <polygon points="16,4 24,26 16,21 8,26" fill="#0066cc" stroke="white" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });

  if (navUserMarker) {
    navUserMarker.setLatLng([lat, lng]);
    navUserMarker.setIcon(svgIcon);
  } else {
    navUserMarker = L.marker([lat, lng], {icon: svgIcon, zIndexOffset: 1000}).addTo(navMap);
  }
}

function setNavDestination(lat, lng) {
  // Remove old destination marker
  if (navDestMarker) navMap.removeLayer(navDestMarker);
  
  // Red pin marker
  const destIcon = L.divIcon({
    className: '',
    html: `<div style="text-align:center">
      <div style="background:#dc2626;color:white;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;margin-bottom:2px">📍 Destination</div>
      <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #dc2626;margin:0 auto"></div>
    </div>`,
    iconSize: [80, 36],
    iconAnchor: [40, 36]
  });

  navDestMarker = L.marker([lat, lng], {icon: destIcon}).addTo(navMap);

  // Show destination info
  document.getElementById('nav-tap-hint').style.display = 'none';
  document.getElementById('nav-dest-info').style.display = 'block';
  document.getElementById('nav-dest-coords').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);

  // Draw route if we have user position
  if (navUserPos) {
    updateNavDistance(navUserPos.lat, navUserPos.lng);
    drawRoute(navUserPos.lat, navUserPos.lng);
  }

  // Fit map to show both points
  if (navUserPos) {
    const bounds = L.latLngBounds(
      [navUserPos.lat, navUserPos.lng],
      [lat, lng]
    );
    navMap.fitBounds(bounds, {padding: [60, 60]});
  }
}

async function drawRoute(fromLat, fromLng) {
  if (!navDestMarker) return;
  const dest = navDestMarker.getLatLng();
  
  try {
    // Use OSRM free routing
    const url = `https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${dest.lng},${dest.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.code === 'Ok' && data.routes.length > 0) {
      const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
      
      if (navRouteLine) navMap.removeLayer(navRouteLine);
      navRouteLine = L.polyline(coords, {
        color: '#0066cc',
        weight: 5,
        opacity: 0.8
      }).addTo(navMap);

      // Update distance from route
      const distMeters = data.routes[0].distance;
      const durationSecs = data.routes[0].duration;
      updateNavDistanceFromRoute(distMeters, durationSecs);
    }
  } catch(e) {
    // OSRM failed - just draw straight line
    if (navRouteLine) navMap.removeLayer(navRouteLine);
    navRouteLine = L.polyline([[fromLat, fromLng], [navDestMarker.getLatLng().lat, navDestMarker.getLatLng().lng]], {
      color: '#0066cc',
      weight: 4,
      opacity: 0.6,
      dashArray: '10,8'
    }).addTo(navMap);
  }
}

function updateNavDistance(fromLat, fromLng) {
  if (!navDestMarker) return;
  const dest = navDestMarker.getLatLng();
  const dist = getDistanceKm(fromLat, fromLng, dest.lat, dest.lng);
  const distEl = document.getElementById('nav-distance');
  if (dist < 1) {
    distEl.innerHTML = `<div style="font-size:24px;font-weight:700;color:#0066cc;font-family:'Fraunces',serif">${Math.round(dist*1000)}m</div><div style="font-size:11px;color:#94a3b8">away</div>`;
  } else {
    distEl.innerHTML = `<div style="font-size:24px;font-weight:700;color:#0066cc;font-family:'Fraunces',serif">${dist.toFixed(1)}km</div><div style="font-size:11px;color:#94a3b8">away</div>`;
  }
}

function updateNavDistanceFromRoute(meters, seconds) {
  const distEl = document.getElementById('nav-distance');
  const mins = Math.round(seconds / 60);
  const dist = meters < 1000 ? Math.round(meters) + 'm' : (meters/1000).toFixed(1) + 'km';
  const time = mins < 60 ? mins + ' min' : Math.floor(mins/60) + 'h ' + (mins%60) + 'm';
  distEl.innerHTML = `<div style="font-size:22px;font-weight:700;color:#0066cc;font-family:'Fraunces',serif">${dist}</div><div style="font-size:11px;color:#94a3b8">${time} drive</div>`;
}

function getDistanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function clearNavDestination() {
  if (navDestMarker) { navMap.removeLayer(navDestMarker); navDestMarker = null; }
  if (navRouteLine) { navMap.removeLayer(navRouteLine); navRouteLine = null; }
  document.getElementById('nav-dest-info').style.display = 'none';
  document.getElementById('nav-tap-hint').style.display = 'block';
}

function stopNavTracking() {
  if (navWatchId !== null) {
    navigator.geolocation.clearWatch(navWatchId);
    navWatchId = null;
  }
}

  let html = '<div style="background:linear-gradient(135deg,#0a1628,#1a3a5c);padding:24px 16px 16px;text-align:center"><div style="font-size:48px">🏴\u200d☠️</div><div style="font-family:Fraunces,serif;font-size:24px;font-weight:700;color:white;margin-top:8px">Treasure Hunts</div><div style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:4px">Answer clues. Find the treasure. Win prizes!</div></div><div style="padding:16px;max-width:600px;margin:0 auto">';
  hunts.forEach(h => {
    html += '<div style="background:white;border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,0.1)"><div style="background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:20px;display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase">Active Hunt</div><div style="font-family:Fraunces,serif;font-size:20px;font-weight:700;color:white;margin-top:4px">' + h.title + '</div></div><div style="background:rgba(255,255,255,0.2);border-radius:12px;padding:8px 12px;text-align:center"><div style="font-family:Fraunces,serif;font-size:22px;font-weight:700;color:white">$' + h.prize_value_sbd + '</div><div style="font-size:10px;color:rgba(255,255,255,0.7)">SBD Prize</div></div></div><div style="padding:16px"><p style="font-size:14px;color:#475569;margin-bottom:12px">' + (h.description||'') + '</p><div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:6px">🎁 Prize</div><div style="font-size:14px;font-weight:600">' + (h.prize_description||'Special prize!') + '</div><div style="font-size:12px;color:#94a3b8;margin-top:4px">📍 Collect at: ' + (h.shop_name||'TBA') + '</div></div><button onclick="startHunt(' + JSON.stringify(h.id) + ',' + JSON.stringify(h.title) + ',' + h.max_finalists + ')" style="width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">🏴\u200d☠️ Start Hunt!</button></div></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

async function startHunt(huntId, huntTitle, maxFinalists) {
  const attempt = await apiFetch('/treasure/' + huntId + '/start', {method:'POST'});
  if (!attempt) return;
  if (attempt.status === 'eliminated') { showTreasureMsg('😔 Eliminated', 'All finalist spots taken. Better luck next time!', '#dc2626'); return; }
  if (attempt.status === 'finalist') { showFinalistScreen(huntId, huntTitle); return; }
  if (attempt.status === 'winner') { showWinnerScreen(huntTitle); return; }
  const qData = await apiFetch('/treasure/' + huntId + '/questions');
  currentQuestions = qData?.questions || [];
  currentHunt = {id: huntId, title: huntTitle, maxFinalists};
  currentAttempt = attempt;
  if (!currentQuestions.length) { showTreasureMsg('⚠️ No Questions', 'This hunt has no questions yet!', '#d97706'); return; }
  showQuestion(attempt.current_question);
}

function showQuestion(qi) {
  if (qi >= currentQuestions.length) { showFinalistScreen(currentHunt.id, currentHunt.title); return; }
  const q = currentQuestions[qi];
  const progress = (qi / currentQuestions.length) * 100;
  const diffEmoji = q.difficulty==='easy'?'🟢':q.difficulty==='medium'?'🟡':'🔴';
  let opts = q.options.map((o,i) => '<button onclick="submitAns(' + JSON.stringify(currentHunt.id) + ',' + JSON.stringify(q.id) + ',' + JSON.stringify(o) + ',this)" style="width:100%;padding:14px;margin-bottom:10px;background:white;border:2px solid #e2e8f0;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:Outfit,sans-serif;text-align:left"><span style="display:inline-block;width:28px;height:28px;background:#f1f5f9;border-radius:50%;text-align:center;line-height:28px;font-size:13px;font-weight:700;margin-right:10px">' + String.fromCharCode(65+i) + '</span>' + o + '</button>').join('');
  document.getElementById('content').innerHTML = '<div style="background:linear-gradient(135deg,#0a1628,#1a3a5c);padding:20px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button onclick="renderTreasure()" style="background:rgba(255,255,255,0.1);border:none;border-radius:8px;padding:6px 12px;color:white;font-family:Outfit,sans-serif;cursor:pointer;font-size:13px">← Back</button><span style="color:rgba(255,255,255,0.7);font-size:13px">Q' + (qi+1) + ' of ' + currentQuestions.length + '</span><span style="font-size:12px;font-weight:700;padding:4px 8px;border-radius:20px;background:rgba(255,255,255,0.15);color:white">' + diffEmoji + ' ' + q.difficulty + '</span></div><div style="background:rgba(255,255,255,0.1);border-radius:8px;height:6px;overflow:hidden"><div style="background:#7c3aed;height:100%;border-radius:8px;width:' + progress + '%"></div></div></div><div style="padding:20px 16px;max-width:600px;margin:0 auto"><div style="font-family:Fraunces,serif;font-size:20px;font-weight:700;color:#1e293b;margin-bottom:20px;line-height:1.4">' + q.question + '</div>' + opts + '<div id="ans-result" style="margin-top:12px"></div></div>';
}

async function submitAns(huntId, qId, answer, btn) {
  document.querySelectorAll('[onclick^="submitAns"]').forEach(b => b.disabled = true);
  btn.style.background = '#f1f5f9';
  const data = await apiFetch('/treasure/' + huntId + '/answer', {method:'POST', body: JSON.stringify({question_id:qId, answer:answer})});
  if (!data) return;
  const res = document.getElementById('ans-result');
  if (data.correct) {
    btn.style.background = '#dcfce7'; btn.style.borderColor = '#16a34a'; btn.style.color = '#166534';
    if (data.finalist) {
      res.innerHTML = '<div style="background:#dcfce7;border:1px solid #86efac;border-radius:12px;padding:16px;text-align:center"><div style="font-size:32px">🏆</div><div style="font-weight:700;color:#166534;font-size:16px;margin-top:8px">You are a FINALIST!</div></div>';
      setTimeout(() => showFinalistScreen(huntId, currentHunt.title), 2000);
    } else if (data.eliminated) {
      res.innerHTML = '<div style="background:#fee2e2;border-radius:12px;padding:16px;text-align:center"><div style="font-size:32px">😔</div><div style="font-weight:700;color:#991b1b">All finalist spots taken!</div></div>';
    } else {
      res.innerHTML = '<div style="background:#dcfce7;border:1px solid #86efac;border-radius:12px;padding:14px"><div style="font-weight:700;color:#166534;margin-bottom:6px">✅ Correct!</div><div style="font-size:14px;color:#166534">🗺️ Clue: ' + (data.clue||'') + '</div>' + (data.clue_lat ? '<div style="font-size:12px;color:#166534;margin-top:4px">📍 ' + parseFloat(data.clue_lat).toFixed(4) + ', ' + parseFloat(data.clue_lng).toFixed(4) + '</div>' : '') + '</div>';
      currentAttempt.current_question++;
      setTimeout(() => showQuestion(currentAttempt.current_question), 2500);
    }
  } else {
    btn.style.background = '#fee2e2'; btn.style.borderColor = '#dc2626'; btn.style.color = '#991b1b';
    res.innerHTML = '<div style="background:#fee2e2;border-radius:12px;padding:12px;text-align:center;color:#991b1b;font-weight:600">❌ Wrong! Try again.</div>';
    setTimeout(() => { document.querySelectorAll('[onclick^="submitAns"]').forEach(b => { b.disabled=false; b.style.background='white'; b.style.borderColor='#e2e8f0'; b.style.color='#1e293b'; }); res.innerHTML=''; }, 1500);
  }
}

async function showFinalistScreen(huntId, huntTitle) {
  const data = await apiFetch('/treasure/' + huntId + '/finalists');
  const finalists = data?.finalists || [];
  document.getElementById('content').innerHTML = '<div style="background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:32px 20px;text-align:center;color:white"><div style="font-size:56px">🏆</div><div style="font-family:Fraunces,serif;font-size:26px;font-weight:700;margin-top:12px">You made the Finals!</div><div style="color:rgba(255,255,255,0.7);font-size:14px;margin-top:6px">' + huntTitle + '</div></div><div style="padding:20px 16px;max-width:600px;margin:0 auto"><div style="background:white;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #e2e8f0"><div style="font-size:16px;font-weight:700;margin-bottom:12px">🎲 Final Challenge — Lucky Bet!</div><p style="font-size:14px;color:#475569;margin-bottom:16px">Place your bet on the sports result. If you are right, you advance!</p><div style="font-weight:700;font-size:15px;margin-bottom:12px">🏉 State of Origin 2026</div><button onclick="placeBet(' + JSON.stringify(huntId) + ',' + JSON.stringify('Queensland Maroons') + ')" style="width:100%;padding:14px;margin-bottom:10px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">🟣 Queensland Maroons</button><button onclick="placeBet(' + JSON.stringify(huntId) + ',' + JSON.stringify('NSW Blues') + ')" style="width:100%;padding:14px;background:linear-gradient(135deg,#0066cc,#0044aa);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">🔵 NSW Blues</button></div><div style="background:#f8fafc;border-radius:12px;padding:16px"><div style="font-weight:700;margin-bottom:10px">👥 Finalists (' + finalists.length + ')</div>' + finalists.map((f,i) => '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e2e8f0"><span style="font-size:18px">' + ['🥇','🥈','🥉','4️⃣','5️⃣'][i] + '</span><span style="font-weight:600">' + f.username + '</span></div>').join('') + '</div></div>';
}

async function placeBet(huntId, option) {
  const data = await apiFetch('/treasure/' + huntId + '/bet', {method:'POST', body: JSON.stringify({bet_option:option})});
  if (data?.message) toast('🎲 Bet placed on ' + option + '! Waiting for result…');
}

function showWinnerScreen(huntTitle) {
  document.getElementById('content').innerHTML = '<div style="min-height:calc(100vh - 54px);background:linear-gradient(135deg,#d97706,#b45309);display:flex;align-items:center;justify-content:center;padding:24px"><div style="text-align:center;color:white"><div style="font-size:80px">🏆</div><div style="font-family:Fraunces,serif;font-size:32px;font-weight:700;margin-top:16px">YOU WON!</div><div style="font-size:16px;color:rgba(255,255,255,0.8);margin-top:8px">' + huntTitle + '</div><div style="background:rgba(255,255,255,0.2);border-radius:16px;padding:20px;margin-top:24px"><div style="font-size:14px">Go collect your prize at the shop!</div><div style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px">Show this screen to the shop owner</div></div></div></div>';
}

function showTreasureMsg(title, msg, color) {
  document.getElementById('content').innerHTML = '<div style="min-height:calc(100vh - 54px);display:flex;align-items:center;justify-content:center;padding:24px"><div style="text-align:center"><div style="font-size:48px;margin-bottom:16px">🏴\u200d☠️</div><div style="font-family:Fraunces,serif;font-size:22px;font-weight:700;color:' + color + '">' + title + '</div><div style="font-size:14px;color:#475569;margin-top:8px;max-width:280px;margin:8px auto 0">' + msg + '</div><button onclick="renderTreasure()" style="margin-top:20px;padding:12px 24px;background:' + color + ';color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif">Back to Hunts</button></div></div>';
}

function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
</script>
</body>
</html>
