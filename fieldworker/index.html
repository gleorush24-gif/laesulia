<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Laesulia — Field Worker</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --navy: #0a1628; --blue: #0066cc; --green: #16a34a;
      --red: #dc2626; --orange: #ea580c; --yellow: #d97706;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-400: #94a3b8; --gray-600: #475569; --gray-800: #1e293b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Outfit', sans-serif; background: var(--gray-50); min-height: 100vh; max-width: 480px; margin: 0 auto; }

    /* ── Auth screens ── */
    .auth-screen { display: none; min-height: 100vh; background: var(--navy); align-items: center; justify-content: center; padding: 24px; flex-direction: column; }
    .auth-screen.active { display: flex; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-family: 'Fraunces', serif; font-size: 32px; color: white; font-weight: 700; }
    .auth-logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 4px; }
    .auth-logo span { color: #60a5fa; font-weight: 600; }
    .auth-card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 400px; }
    .auth-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-600); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; font-family: 'Outfit', sans-serif; outline: none; }
    .field input:focus { border-color: var(--blue); }
    .btn-full { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'Outfit', sans-serif; cursor: pointer; margin-top: 8px; }
    .btn-full.green { background: var(--green); }
    .auth-switch { text-align: center; margin-top: 16px; font-size: 14px; color: var(--gray-600); }
    .auth-switch a { color: var(--blue); font-weight: 600; cursor: pointer; text-decoration: none; }
    .auth-error { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

    /* ── App ── */
    #app { display: none; }

    /* ── Top bar ── */
    .topbar { background: var(--navy); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left h1 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; }
    .topbar-left p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 1px; }
    .wallet-chip { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 12px; font-size: 13px; font-weight: 600; color: white; cursor: pointer; }

    /* ── Bottom nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1px solid var(--gray-200); display: flex; z-index: 100; }
    .nav-btn { flex: 1; padding: 10px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; border: none; background: none; font-family: 'Outfit', sans-serif; color: var(--gray-400); transition: color 0.15s; }
    .nav-btn.active { color: var(--blue); }
    .nav-btn .icon { font-size: 20px; }
    .nav-btn .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

    /* ── Content ── */
    .content { padding-bottom: 70px; }

    /* ── Map ── */
    #map { height: calc(100vh - 120px); width: 100%; }

    /* ── Bounty list ── */
    .section { padding: 16px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .bounty-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--gray-200); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .bounty-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .bounty-title { font-size: 16px; font-weight: 700; }
    .bounty-desc { font-size: 13px; color: var(--gray-600); margin-top: 2px; }
    .reward-chip { background: var(--red); color: white; font-size: 13px; font-weight: 700; padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
    .reward-chip.orange { background: var(--orange); }
    .reward-chip.green { background: var(--green); }
    .bounty-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .status-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .status-open { background: #dbeafe; color: var(--blue); }
    .status-claimed { background: #fef3c7; color: var(--yellow); }
    .status-submitted { background: #dcfce7; color: var(--green); }
    .bounty-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: 'Outfit', sans-serif; cursor: pointer; }
    .bounty-btn.claim { background: var(--blue); color: white; }
    .bounty-btn.upload { background: var(--orange); color: white; }
    .bounty-btn.submit { background: var(--green); color: white; }

    /* ── Upload screen ── */
    .upload-header { background: white; border-bottom: 1px solid var(--gray-200); padding: 16px; display: flex; align-items: center; gap: 12px; }
    .back-btn { background: var(--gray-100); border: none; border-radius: 8px; padding: 8px 12px; font-size: 16px; cursor: pointer; }
    .upload-title { font-size: 16px; font-weight: 700; }
    .upload-body { padding: 16px; }
    .bounty-info-card { background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .progress-bar { background: var(--gray-200); border-radius: 8px; height: 8px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill { background: var(--green); height: 100%; border-radius: 8px; transition: width 0.3s; }
    .progress-text { font-size: 13px; color: var(--gray-600); margin-bottom: 20px; }
    .photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
    .photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; border: 2px solid var(--green); }
    .add-photo-btn { width: 100%; padding: 16px; border: 2px dashed var(--gray-200); background: white; border-radius: 12px; font-size: 15px; font-weight: 600; color: var(--gray-600); font-family: 'Outfit', sans-serif; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .add-photo-btn:active { background: var(--gray-50); }
    .msg-box { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }
    .msg-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* ── Wallet ── */
    .wallet-hero { background: var(--navy); color: white; padding: 32px 20px; text-align: center; }
    .wallet-balance { font-family: 'Fraunces', serif; font-size: 48px; font-weight: 700; }
    .wallet-label { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .wallet-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
    .wallet-stat { background: white; border-radius: 12px; padding: 16px; border: 1px solid var(--gray-200); text-align: center; }
    .wallet-stat-val { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; color: var(--green); }
    .wallet-stat-label { font-size: 12px; color: var(--gray-400); margin-top: 4px; }

    /* ── Profile ── */
    .profile-header { background: var(--navy); color: white; padding: 32px 20px; text-align: center; }
    .profile-avatar { width: 72px; height: 72px; background: var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin: 0 auto 12px; }
    .profile-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; }
    .profile-email { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .profile-menu { padding: 16px; }
    .menu-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid var(--gray-200); }
    .menu-item-left { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
    .menu-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* ── Instructions ── */
    .instructions { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .instructions ul { padding-left: 16px; }
    .instructions li { font-size: 13px; color: #1e40af; margin-bottom: 4px; }

    /* ── Hidden file input ── */
    #file-input { display: none; }

    /* ── Loading overlay ── */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--gray-800); color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transition: all 0.25s; z-index: 500; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Login -->
<div class="auth-screen active" id="login-screen">
  <div class="auth-logo">
    <h1>🗺️ Laesulia</h1>
    <p>"<span>to follow</span>" — Toobaita, Malaita</p>
  </div>
  <div class="auth-card">
    <h2>Sign In</h2>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" onkeyup="if(event.key==='Enter')login()"></div>
    <div class="auth-error" id="login-error"></div>
    <button class="btn-full" onclick="login()" id="login-btn">Sign In</button>
    <div class="auth-switch">New to Laesulia? <a onclick="showRegister()">Create account</a></div>
  </div>
</div>

<!-- Register -->
<div class="auth-screen" id="register-screen">
  <div class="auth-logo">
    <h1>🗺️ Laesulia</h1>
    <p>Join as a Field Worker</p>
  </div>
  <div class="auth-card">
    <h2>Create Account</h2>
    <div class="field"><label>Full Name</label><input type="text" id="reg-name" placeholder="e.g. John Kwai"></div>
    <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="reg-password" placeholder="Min 6 characters"></div>
    <div class="auth-error" id="reg-error"></div>
    <button class="btn-full green" onclick="register()" id="reg-btn">Create Account</button>
    <div class="auth-switch">Already have an account? <a onclick="showLogin()">Sign in</a></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>🗺️ Laesulia</h1>
      <p id="topbar-sub">Field Worker</p>
    </div>
    <div class="wallet-chip" id="wallet-chip" onclick="navigate('wallet')">💰 $0 SBD</div>
  </div>

  <div class="content" id="content"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-map" onclick="navigate('map')">
      <span class="icon">🗺️</span><span class="label">Map</span>
    </button>
    <button class="nav-btn" id="nav-bounties" onclick="navigate('bounties')">
      <span class="icon">🎯</span><span class="label">Bounties</span>
    </button>
    <button class="nav-btn" id="nav-wallet" onclick="navigate('wallet')">
      <span class="icon">💰</span><span class="label">Wallet</span>
    </button>
    <button class="nav-btn" id="nav-profile" onclick="navigate('profile')">
      <span class="icon">👤</span><span class="label">Profile</span>
    </button>
  </nav>
</div>

<input type="file" id="file-input" accept="image/*" capture="environment">
<div class="toast" id="toast"></div>

<script>
const API = 'https://laesulia-api.onrender.com/api/v1';
let token = localStorage.getItem('fw_token');
let username = localStorage.getItem('fw_username');
let email = localStorage.getItem('fw_email');
let currentView = 'map';
let mapInstance = null;
let currentUploadBounty = null;
let uploadedFiles = [];
let required = 1;

window.onload = () => {
  if (token) showApp();
  document.getElementById('file-input').addEventListener('change', handleFileSelect);
};

// ── Auth ──────────────────────────────────────────────────────────────────────
function showRegister() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('register-screen').classList.add('active');
}
function showLogin() {
  document.getElementById('register-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
}

async function login() {
  const emailVal = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: emailVal, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    saveAuth(data);
    showApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.innerHTML = 'Sign In'; btn.disabled = false;
  }
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const emailVal = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  const btn = document.getElementById('reg-btn');
  errEl.style.display = 'none';
  if (!name || !emailVal || !password) { errEl.textContent = 'All fields required'; errEl.style.display = 'block'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return; }
  btn.innerHTML = '<span class="spinner"></span>Creating account…';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: name, email: emailVal, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');
    saveAuth(data);
    showApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.innerHTML = 'Create Account'; btn.disabled = false;
  }
}

function saveAuth(data) {
  token = data.token; username = data.username;
  localStorage.setItem('fw_token', token);
  localStorage.setItem('fw_username', data.username);
  localStorage.setItem('fw_email', document.getElementById('login-email')?.value || document.getElementById('reg-email')?.value || '');
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('register-screen').classList.remove('active');
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-sub').textContent = username || 'Field Worker';
  navigate('map');
  loadWallet();
}

function logout() {
  localStorage.clear(); token = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.add('active');
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token, ...(options.headers||{})}
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');
  const content = document.getElementById('content');
  if (view === 'map') renderMap();
  else if (view === 'bounties') renderBounties();
  else if (view === 'wallet') renderWallet();
  else if (view === 'profile') renderProfile();
}

// ── Map ───────────────────────────────────────────────────────────────────────
async function renderMap() {
  document.getElementById('content').innerHTML = '<div id="map"></div>';
  await new Promise(r => setTimeout(r, 50));

  if (mapInstance) { mapInstance.remove(); mapInstance = null; }

  mapInstance = L.map('map').setView([-9.4313, 160.0521], 13);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri', userAgentPackageName: 'com.laesulia.app'
  }).addTo(mapInstance);

  const data = await apiFetch('/bounties?lat=-9.4313&lng=160.0521&radius=50000');
  if (!data?.bounties) return;

  data.bounties.forEach(b => {
    const color = b.status === 'open' ? '#dc2626' : b.status === 'claimed' ? '#ea580c' : '#16a34a';
    const emoji = b.status === 'open' ? '🔴' : b.status === 'claimed' ? '🟡' : '✅';
    const marker = L.circleMarker([b.lat, b.lng], {
      radius: 10, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.9
    }).addTo(mapInstance);
    marker.bindPopup(`
      <div style="font-family:'Outfit',sans-serif;min-width:160px">
        <div style="font-weight:700;font-size:14px">${emoji} ${b.title}</div>
        <div style="color:#6b7280;font-size:12px;margin:4px 0">${b.status}</div>
        <div style="font-weight:700;color:#dc2626;margin-bottom:8px">$${b.reward_sbd} SBD</div>
        ${b.status === 'open' ? `<button onclick="claimBounty('${b.id}','${b.title.replace(/'/g,"\\'")}',${b.reward_sbd})" style="width:100%;padding:8px;background:#0066cc;color:white;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif">🎯 Claim</button>` : ''}
      </div>
    `);
  });
}

// ── Bounties ──────────────────────────────────────────────────────────────────
async function renderBounties() {
  document.getElementById('content').innerHTML = '<div class="section"><div class="section-title">Loading…</div></div>';
  const data = await apiFetch('/bounties?lat=-9.4313&lng=160.0521&radius=50000');
  if (!data?.bounties?.length) {
    document.getElementById('content').innerHTML = '<div class="section"><div style="text-align:center;padding:48px;color:#94a3b8">No bounties available right now</div></div>';
    return;
  }

  const open = data.bounties.filter(b => b.status === 'open');
  const mine = data.bounties.filter(b => b.status === 'claimed');

  let html = '<div class="section">';
  if (open.length) {
    html += `<div class="section-title">🔴 Open — ${open.length} available</div>`;
    open.forEach(b => {
      html += `
        <div class="bounty-card">
          <div class="bounty-card-header">
            <div><div class="bounty-title">${b.title}</div><div class="bounty-desc">${b.description || 'No instructions'}</div></div>
            <div class="reward-chip">$${b.reward_sbd} SBD</div>
          </div>
          <div class="bounty-meta">
            <span class="status-badge status-open">Open</span>
            <span style="font-size:12px;color:#94a3b8">${b.submit_type}</span>
          </div>
          <button class="bounty-btn claim" onclick="claimBounty('${b.id}','${b.title.replace(/'/g,"\\'")}',${b.reward_sbd})">🎯 Claim — $${b.reward_sbd} SBD</button>
        </div>`;
    });
  }

  if (mine.length) {
    html += `<div class="section-title" style="margin-top:16px">🟡 My Claimed Bounties</div>`;
    mine.forEach(b => {
      html += `
        <div class="bounty-card">
          <div class="bounty-card-header">
            <div><div class="bounty-title">${b.title}</div><div class="bounty-desc">${b.description || ''}</div></div>
            <div class="reward-chip orange">$${b.reward_sbd} SBD</div>
          </div>
          <div class="bounty-meta"><span class="status-badge status-claimed">Claimed</span></div>
          <button class="bounty-btn upload" onclick="openUpload('${b.id}','${b.title.replace(/'/g,"\\'")}',${b.reward_sbd},'${b.description?.replace(/'/g,"\\'")||''}')">📸 Upload Photos</button>
        </div>`;
    });
  }

  if (!open.length && !mine.length) {
    html += '<div style="text-align:center;padding:48px;color:#94a3b8">No open bounties right now. Check back soon! 🌴</div>';
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

async function claimBounty(id, title, reward) {
  if (mapInstance) { mapInstance.closePopup(); }
  const data = await apiFetch('/bounties/' + id + '/claim', {method:'POST'});
  if (data?.message) {
    toast('✅ Claimed! Go take your photos.');
    setTimeout(() => openUpload(id, title, reward, ''), 500);
  } else {
    toast('❌ ' + (data?.error || 'Already claimed'));
  }
}

// ── Upload ────────────────────────────────────────────────────────────────────
function openUpload(id, title, reward, desc) {
  currentUploadBounty = {id, title, reward, desc};
  uploadedFiles = [];
  renderUploadScreen();
}

function renderUploadScreen() {
  const b = currentUploadBounty;
  if (!b) return;
  const progress = uploadedFiles.length / required;
  const photosHtml = uploadedFiles.map(f => `<img class="photo-thumb" src="${f}">`).join('');

  document.getElementById('content').innerHTML = `
    <div class="upload-header">
      <button class="back-btn" onclick="navigate('bounties')">←</button>
      <div class="upload-title">Upload Photos</div>
    </div>
    <div class="upload-body">
      <div class="bounty-info-card">
        <div style="font-size:28px">🎯</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:15px">${b.title}</div>
          <div style="font-size:13px;color:#6b7280">${b.desc || 'Take clear photos of this location'}</div>
        </div>
        <div style="background:#dc2626;color:white;padding:5px 10px;border-radius:20px;font-weight:700;font-size:13px">$${b.reward} SBD</div>
      </div>

      <div class="instructions">
        <ul>
          <li>📍 Go to the exact GPS location on the map</li>
          <li>📸 Take ${required} clear photo(s)</li>
          <li>☀️ Make sure lighting is good</li>
          <li>🔄 Show different angles of the location</li>
        </ul>
      </div>

      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:600">Progress</span>
          <span style="font-size:13px;color:#6b7280">${uploadedFiles.length} of ${required} uploaded</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(progress*100,100)}%"></div></div>
      </div>

      ${photosHtml ? `<div class="photo-grid">${photosHtml}</div>` : ''}

      <div id="upload-msg"></div>

      ${uploadedFiles.length < required ? `
        <button class="add-photo-btn" onclick="document.getElementById('file-input').click()">
          📷 Add Photo (${uploadedFiles.length}/${required})
        </button>` : ''}

      ${uploadedFiles.length >= required ? `
        <button class="bounty-btn submit" onclick="submitBounty()" id="submit-btn">
          ✅ Submit for Review — $${b.reward} SBD
        </button>` : ''}
    </div>`;
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
}

async function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file || !currentUploadBounty) return;
  e.target.value = '';

  const msgEl = document.getElementById('upload-msg');
  if (msgEl) msgEl.innerHTML = '<div class="msg-box msg-success"><span class="spinner"></span> Uploading…</div>';

  try {
    const bytes = await file.arrayBuffer();
    const blob = new Blob([bytes], {type: 'image/jpeg'});
    const formData = new FormData();
    formData.append('file', blob, file.name);

    const res = await fetch(API + '/bounties/' + currentUploadBounty.id + '/upload', {
      method: 'POST',
      headers: {'Authorization': 'Bearer ' + token},
      body: formData
    });
    const data = await res.json();
    if (res.ok) {
      // Store preview
      const reader = new FileReader();
      reader.onload = (ev) => {
        uploadedFiles.push(ev.target.result);
        renderUploadScreen();
      };
      reader.readAsDataURL(file);
    } else {
      if (msgEl) msgEl.innerHTML = `<div class="msg-box msg-error">❌ ${data.error || 'Upload failed'}</div>`;
    }
  } catch(err) {
    if (msgEl) msgEl.innerHTML = `<div class="msg-box msg-error">❌ Network error</div>`;
  }
}

async function submitBounty() {
  const btn = document.getElementById('submit-btn');
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Submitting…'; btn.disabled = true; }
  const data = await apiFetch('/bounties/' + currentUploadBounty.id + '/submit', {
    method: 'POST', body: JSON.stringify({files:[]})
  });
  if (data?.message) {
    toast('🎉 Submitted! Waiting for admin review.');
    currentUploadBounty = null; uploadedFiles = [];
    loadWallet();
    setTimeout(() => navigate('bounties'), 1000);
  } else {
    toast('❌ ' + (data?.error || 'Submit failed'));
    if (btn) { btn.innerHTML = '✅ Submit for Review'; btn.disabled = false; }
  }
}

// ── Wallet ────────────────────────────────────────────────────────────────────
async function loadWallet() {
  const data = await apiFetch('/wallet');
  if (data) {
    const balance = data.balance_sbd || 0;
    document.getElementById('wallet-chip').textContent = `💰 $${balance} SBD`;
  }
}

    <div class="section">
      <div class="section-title">How to earn</div>
      <div style="background:white;border-radius:12px;padding:16px;border:1px solid #e2e8f0">
        <div style="display:flex;gap:12px;margin-bottom:12px"><span style="font-size:20px">1️⃣</span><div><div style="font-weight:600">Find an open bounty pin on the map</div><div style="font-size:13px;color:#6b7280">Red pins are available to claim</div></div></div>
        <div style="display:flex;gap:12px;margin-bottom:12px"><span style="font-size:20px">2️⃣</span><div><div style="font-weight:600">Go to the location & take photos</div><div style="font-size:13px;color:#6b7280">Clear photos from different angles</div></div></div>
        <div style="display:flex;gap:12px;margin-bottom:12px"><span style="font-size:20px">3️⃣</span><div><div style="font-weight:600">Upload & submit for review</div><div style="font-size:13px;color:#6b7280">Admin reviews your photos</div></div></div>
        <div style="display:flex;gap:12px"><span style="font-size:20px">4️⃣</span><div><div style="font-weight:600">Get paid in SBD!</div><div style="font-size:13px;color:#6b7280">Payment added to your wallet</div></div></div>
      </div>

}

// ── Profile ───────────────────────────────────────────────────────────────────

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
