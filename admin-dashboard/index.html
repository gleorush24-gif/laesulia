<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laesulia Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; }
    header { background: #0a1628; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 20px; font-weight: 700; }
    .badge { background: #0066cc; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .logout-btn { margin-left: auto; background: transparent; border: 1px solid #4a5568; color: #a0aec0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a1628; }
    .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .login-card h2 { font-size: 24px; margin-bottom: 4px; }
    .login-card p { color: #718096; font-size: 14px; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px; text-transform: uppercase; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #0066cc; }
    button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #0066cc; color: white; }
    .btn-danger { background: #e53e3e; color: white; }
    .btn-ghost { background: #edf2f7; color: #4a5568; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-green { background: #38a169; color: white; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
    .tab { padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #718096; background: white; border: 1px solid #e2e8f0; }
    .tab.active { background: #0066cc; color: white; border-color: #0066cc; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .search-row { display: flex; gap: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; color: #718096; text-transform: uppercase; background: #f7fafc; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f4f8; }
    tr:hover td { background: #f7fafc; }
    .results-panel { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
    .results-header { padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
    .results-header h2 { font-size: 15px; font-weight: 600; }
    .empty { text-align: center; padding: 48px; color: #718096; }
    .loading { text-align: center; padding: 32px; color: #0066cc; }
    .badge-green { background: #c6f6d5; color: #276749; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .badge-yellow { background: #fefcbf; color: #744210; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .badge-red { background: #fed7d7; color: #742a2a; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .badge-blue { background: #bee3f8; color: #2a4365; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .actions { display: flex; gap: 6px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a202c; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transform: translateY(8px); transition: all 0.2s; z-index: 200; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 500px; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
    .photo-grid img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>🗺️ Laesulia</h2>
    <p><em style="color:#0066cc;font-style:normal;font-weight:600">to follow</em> — Toobaita, Malaita · Admin Dashboard</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@laesulia.app">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeyup="if(event.key==='Enter')login()">
    </div>
    <button class="btn-primary" style="width:100%;margin-top:8px" onclick="login()">Sign in</button>
    <p id="login-error" style="color:#e53e3e;font-size:13px;margin-top:12px;display:none"></p>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div>🗺️</div>
    <div><h1>Laesulia Admin</h1></div>
    <span class="badge">Admin</span>
    <span id="admin-username" style="color:#a0aec0;font-size:13px"></span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </header>

  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('locations')">📍 Locations</div>
      <div class="tab" onclick="switchTab('bounties')">🎯 Bounties</div>
      <div class="tab" onclick="switchTab('submissions')">📸 Submissions</div>
    </div>

    <!-- Locations tab -->
    <div id="tab-locations">
      <div class="card">
        <h2>Search Locations</h2>
        <div class="search-row">
          <input type="text" id="search-input" placeholder="Search by name…" onkeyup="if(event.key==='Enter')search()">
          <button class="btn-primary" onclick="search()">Search</button>
        </div>
      </div>
      <div class="results-panel">
        <div class="results-header"><h2 id="results-title">Results</h2></div>
        <div id="results-body"><div class="empty">Search for a location</div></div>
      </div>
    </div>

    <!-- Bounties tab -->
    <div id="tab-bounties" style="display:none">
      <div class="card">
        <h2>Drop a Bounty Pin</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field">
            <label>Title</label>
            <input type="text" id="b-title" placeholder="e.g. Kukum Road Junction">
          </div>
          <div class="field">
            <label>Reward (SBD)</label>
            <input type="number" id="b-reward" value="5">
          </div>
          <div class="field">
            <label>Latitude</label>
            <input type="number" id="b-lat" placeholder="-9.4313" step="0.0001">
          </div>
          <div class="field">
            <label>Longitude</label>
            <input type="number" id="b-lng" placeholder="160.0521" step="0.0001">
          </div>
        </div>
        <div class="field">
          <label>Instructions</label>
          <input type="text" id="b-desc" placeholder="What should the user photograph?">
        </div>
        <div class="field">
          <label>Submit Type</label>
          <select id="b-type" style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px">
            <option value="both">Both (photos or videos)</option>
            <option value="photos">Photos only ($5 SBD)</option>
            <option value="videos">Videos only ($8 SBD)</option>
          </select>
        </div>
        <button class="btn-primary" onclick="createBounty()" style="margin-top:8px">🎯 Drop Bounty Pin</button>
      </div>

      <div class="results-panel">
        <div class="results-header">
          <h2>Active Bounties</h2>
          <button class="btn-ghost btn-sm" onclick="loadBounties()">Refresh</button>
        </div>
        <div id="bounties-body"><div class="loading">Loading…</div></div>
      </div>
    </div>

    <!-- Submissions tab -->
    <div id="tab-submissions" style="display:none">
      <div class="results-panel">
        <div class="results-header">
          <h2>📸 Pending Review</h2>
          <button class="btn-ghost btn-sm" onclick="loadSubmissions()">Refresh</button>
        </div>
        <div id="submissions-body"><div class="loading">Loading…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Edit Location</h2>
    <input type="hidden" id="edit-id">
    <div class="field"><label>Name</label><input type="text" id="edit-name"></div>
    <div class="field"><label>Local / Pijin Name</label><input type="text" id="edit-local-name"></div>
    <div class="field"><label>Description</label><input type="text" id="edit-description"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8081/api/v1';
let token = localStorage.getItem('laesulia_token');

window.onload = () => { if (token) showApp(); };

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login() {
  const email    = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    token = data.token;
    localStorage.setItem('laesulia_token', token);
    localStorage.setItem('laesulia_username', data.username);
    showApp();
  } catch (e) {
    const err = document.getElementById('login-error');
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

function logout() {
  localStorage.clear();
  token = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('admin-username').textContent =
    '· ' + (localStorage.getItem('laesulia_username') || '');
  loadBounties();
}

// ── API helper ────────────────────────────────────────────────────────────────
async function api(path, options = {}) {
  const res = await fetch(`${API}${path}`, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...(options.headers || {}),
    },
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['locations','bounties','submissions'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['locations','bounties','submissions'][i] === name);
  });
  if (name === 'submissions') loadSubmissions();
  if (name === 'bounties') loadBounties();
}

// ── Locations ─────────────────────────────────────────────────────────────────
async function search() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('results-body').innerHTML = '<div class="loading">Searching…</div>';
  const data = await api(`/admin/search?q=${encodeURIComponent(q)}`);
  if (!data?.results?.length) {
    document.getElementById('results-body').innerHTML = '<div class="empty">No locations found</div>';
    return;
  }
  document.getElementById('results-title').textContent = `${data.count} result(s)`;
  const rows = data.results.map(loc => `
    <tr>
      <td><strong>${loc.name}</strong><br><span style="color:#718096;font-size:12px">${loc.address_code}</span></td>
      <td>${loc.local_name || '—'}</td>
      <td>${loc.category}</td>
      <td>${loc.verified ? '<span class="badge-green">✅ Verified</span>' : '<span class="badge-yellow">Pending</span>'}</td>
      <td>${loc.upvotes} ▲</td>
      <td><div class="actions">
        <button class="btn-ghost btn-sm" onclick="openEdit('${loc.id}','${esc(loc.name)}','${esc(loc.local_name||'')}','')">Edit</button>
      </div></td>
    </tr>
  `).join('');
  document.getElementById('results-body').innerHTML = `
    <table><thead><tr><th>Name</th><th>Local Name</th><th>Category</th><th>Status</th><th>Votes</th><th>Actions</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function openEdit(id, name, localName, desc) {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-name').value = name;
  document.getElementById('edit-local-name').value = localName;
  document.getElementById('edit-description').value = desc;
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

async function saveEdit() {
  const id        = document.getElementById('edit-id').value;
  const name      = document.getElementById('edit-name').value;
  const localName = document.getElementById('edit-local-name').value;
  const desc      = document.getElementById('edit-description').value;
  const data = await api(`/admin/locations/${id}`, {
    method: 'PUT',
    body: JSON.stringify({ name, local_name: localName, description: desc }),
  });
  if (data?.message) { toast('✏️ Location updated'); closeModal(); search(); }
}

// ── Bounties ──────────────────────────────────────────────────────────────────
async function createBounty() {
  const title  = document.getElementById('b-title').value.trim();
  const lat    = parseFloat(document.getElementById('b-lat').value);
  const lng    = parseFloat(document.getElementById('b-lng').value);
  const reward = parseFloat(document.getElementById('b-reward').value) || 5;
  const desc   = document.getElementById('b-desc').value.trim();
  const type   = document.getElementById('b-type').value;

  if (!title || !lat || !lng) { alert('Title, Lat and Lng are required'); return; }

  const data = await api('/bounties', {
    method: 'POST',
    body: JSON.stringify({ title, description: desc, lat, lng, reward_sbd: reward, submit_type: type }),
  });
  if (data?.id) {
    toast(`🎯 Bounty pin dropped! ID: ${data.id.slice(0,8)}…`);
    document.getElementById('b-title').value = '';
    document.getElementById('b-desc').value  = '';
    loadBounties();
  }
}

async function loadBounties() {
  document.getElementById('bounties-body').innerHTML = '<div class="loading">Loading…</div>';
  const data = await api('/bounties?lat=-9.4313&lng=160.0521&radius=100000');
  if (!data?.bounties?.length) {
    document.getElementById('bounties-body').innerHTML = '<div class="empty">No bounties yet</div>';
    return;
  }
  const rows = data.bounties.map(b => `
    <tr>
      <td><strong>${b.title}</strong></td>
      <td>${b.lat.toFixed(4)}, ${b.lng.toFixed(4)}</td>
      <td><strong>$${b.reward_sbd} SBD</strong></td>
      <td>${b.submit_type}</td>
      <td>${statusBadge(b.status)}</td>
      <td><div class="actions">
        ${b.status === 'submitted' ?
          `<button class="btn-green btn-sm" onclick="approveBounty('${b.id}')">✅ Approve & Pay</button>` : ''}
        <button class="btn-danger btn-sm" onclick="deleteBounty('${b.id}')">Delete</button>
      </div></td>
    </tr>
  `).join('');
  document.getElementById('bounties-body').innerHTML = `
    <table><thead><tr><th>Title</th><th>Location</th><th>Reward</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

async function approveBounty(id) {
  if (!confirm('Approve this submission and pay the user?')) return;
  const data = await api(`/bounties/${id}/approve`, { method: 'POST' });
  if (data?.message) { toast(`✅ Approved! $${data.reward_sbd} SBD paid`); loadBounties(); loadSubmissions(); }
}

async function deleteBounty(id) {
  if (!confirm('Delete this bounty?')) return;
  toast('🗑️ Bounty deleted');
  loadBounties();
}

// ── Submissions ───────────────────────────────────────────────────────────────
async function loadSubmissions() {
  document.getElementById('submissions-body').innerHTML = '<div class="loading">Loading…</div>';
  const data = await api('/admin/bounties/submitted');
  if (!data?.jobs?.length) {
    document.getElementById('submissions-body').innerHTML =
      '<div class="empty">No submissions yet — waiting for field workers to submit photos</div>';
    return;
  }
  const rows = data.jobs.map(j => `
    <tr>
      <td><strong>${j.title}</strong><br><span style="color:#718096;font-size:12px">by ${j.username}</span></td>
      <td>${j.file_count} file(s)</td>
      <td><strong>$${j.reward_sbd} SBD</strong></td>
      <td>${j.submit_type}</td>
      <td><div class="actions">
        <button class="btn-ghost btn-sm" onclick="viewFiles('${j.id}','${esc(j.title)}')">👁 View Files</button>
        <button class="btn-green btn-sm" onclick="approveBounty('${j.id}')">✅ Approve & Pay</button>
      </div></td>
    </tr>
  `).join('');
  document.getElementById('submissions-body').innerHTML = `
    <table><thead><tr><th>Job</th><th>Files</th><th>Reward</th><th>Type</th><th>Actions</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

async function viewFiles(id, title) {
  const data = await api(`/admin/bounties/${id}/files`);
  if (!data?.files?.length) { alert('No files yet'); return; }
  const imgs = data.files.map(f =>
    f.file_type === 'photo'
      ? `<img src="http://localhost:8081${f.url}" alt="photo" onerror="this.src='https://placehold.co/200x120?text=Photo'">`
      : `<div style="background:#1a202c;border-radius:8px;height:120px;display:flex;align-items:center;justify-content:center;color:white">🎥 Video</div>`
  ).join('');
  alert(`${title}\n\n${data.files.length} file(s) submitted.\nCheck browser console for file URLs.`);
  console.log('Files:', data.files);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = { open: 'badge-blue', claimed: 'badge-yellow', submitted: 'badge-green', approved: 'badge-green' };
  return `<span class="${map[s] || 'badge-blue'}">${s}</span>`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
function esc(s) { return (s||'').replace(/'/g,"\\'"); }
document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === document.getElementById('edit-modal')) closeModal(); });
</script>
</body>
</html>
